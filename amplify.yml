version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -f .env.production
        - touch .env.production
        - |
          for var in OPENAI_API_KEY OPENAI_MODEL OPENAI_API_BASE_URL OPENAI_TIMEOUT_MS OPENAI_MAX_TOKENS OPENAI_TEXT_MAX_TOKENS OPENAI_AUDIO_API_URL OPENAI_AUDIO_MODEL OPENAI_AUDIO_TIMEOUT_MS AI_DYNAMODB_TABLE_NAME AI_AWS_REGION AI_AWS_ACCESS_KEY_ID AI_AWS_SECRET_ACCESS_KEY AI_AWS_SESSION_TOKEN; do
            value="$(printenv "$var" || true)"
            if [ -n "$value" ]; then
              printf "%s=%s\n" "$var" "$value" >> .env.production
            fi
          done
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
