<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your device's offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Noto Sans", sans-serif;
        background: #f4f8fb;
        color: #122532;
      }
      .box {
        text-align: center;
        background: #fff;
        border: 1px solid #d6e4eb;
        border-radius: 14px;
        padding: 1.2rem;
        width: min(460px, calc(100% - 2rem));
      }
      p {
        color: #4f6675;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Ops~ It is offline.</h1>
      <p>Please check your network connection and try again.</p>
    </div>
  </body>
</html>
